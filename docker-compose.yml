services:
  powerguardian-connector:
    image: ghcr.io/powerguardianos/connectoros-docker:latest
    network_mode: host
    privileged: true
    volumes:
      - ./data:/data
      - /etc/nut:/etc/nut
      - /var/run/nut:/var/run/nut
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - PG_DATA_DIR=/data
      - PG_AGENT_KEY=
      - PG_WATCHTOWER_URL=http://localhost:9000
      - PG_WATCHTOWER_TOKEN=changeme
    extra_hosts:
      - "powerguardian.local:10.0.0.40"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
