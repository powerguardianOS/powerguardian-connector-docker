services:
  powerguardian-connector:
    image: ghcr.io/powerguardianos/connectoros-docker:latest
    container_name: powerguardian-connector
    network_mode: host
    privileged: true
    volumes:
      - ./data:/data
      - nut-etc:/etc/nut
      - nut-run:/var/run/nut
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - PG_DATA_DIR=/data
      - PG_CONTROLLER_URL=${PG_CONTROLLER_URL:-}
      - PG_AGENT_KEY=${PG_AGENT_KEY:-}
    restart: unless-stopped

volumes:
  nut-etc:
  nut-run:
