name: Build & Publish Docker Image

on:
  repository_dispatch:
    types: [connector-updated]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout connector-os source
        uses: actions/checkout@v4
        with:
          repository: powerguardianOS/powerguardian-connector-os
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: connector-os
          ref: ${{ github.event.client_payload.sha || 'master' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm/v7,linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/powerguardianos/connectoros-docker:latest
            ghcr.io/powerguardianos/connectoros-docker:${{ github.event.client_payload.sha || github.sha }}
          build-args: |
            VERSION=${{ github.event.client_payload.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max